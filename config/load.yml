version: 1

jobs:
  - name: material-create
    title: Material Create
    method: POST
    path: /v2/materials
    input:
      header_row: 1
    columns:
      code:
        header: Code
        headers:
          - Material Code
        type: text
        required: true
      product_type:
        header: Product Type
        headers:
          - Material Type
          - Type
        type: ref
        required: true
        resolve:
          endpoint: material_types
          match: node_name
          output: id
          filters:
            available: true
      description:
        header: Description
        headers:
          - Desc
        type: text
    body:
      code: code
      product_type: product_type
      description: description

  - name: material-composition-create
    title: Material Composition Create
    method: POST
    path: /v2/materials/{material}/technical_compositions
    input:
      header_row: 1
    columns:
      material:
        header: Material
        headers:
          - Material ID
          - Material Id
          - Material Code
          - Code
        type: ref_or_id
        required: true
        resolve:
          endpoint: materials
          match: code
          output: id
      compositions:
        header: Composition
        headers:
          - Technical Composition
          - Material Composition
          - Fiber Content
          - Content
        type: composition_list
        required: true
        resolve:
          endpoint: compositions
          match: node_name
          output: id
          filters:
            active: true
    body: compositions

  - name: style-bom-load
    title: Style BOM Load
    workflow: style_bom
    method: POST
    path: /v2/styles/{style}/data_sheets/apparel_boms
    input:
      header_row: 1
    columns:
      season:
        header: Season
        type: text
        required: true
      style:
        header: Style
        headers:
          - Style Name
        type: scoped_ref
        required: true
        resolve:
          endpoint: styles
          match: node_name
          output: id
          scope:
            column: season
            endpoint: seasons
            via: parent_season
            match: node_name
      node_name:
        header: BOM Name
        headers:
          - Name
          - Node Name
        type: text
        required: true
      description:
        header: Description
        headers:
          - Desc
        type: text
      subtype:
        header: Subtype
        headers:
          - BOM Subtype
          - BOM Type
        type: ref
        required: true
        resolve:
          endpoint: bom_subtypes
          match: node_name
          output: id
      section:
        header: Section
        type: text
        required: true
      pm_id:
        header: PM ID
        headers:
          - Part Material ID
          - Line ID
        type: text
        required: true
      qty_default:
        header: Quantity
        headers:
          - Qty
          - Qty Default
        type: number
        required: true
      actual:
        header: Material Code
        headers:
          - Material
          - Actual
        type: ref
        required: true
        resolve:
          endpoint: materials
          match: code
          output: id
    body:
      node_name: node_name
      description: description
      subtype: subtype
