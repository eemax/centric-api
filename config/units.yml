version: 1

dimensions:
  mass:
    base: kg
    consumption:
      basis: direct_mass
      bom_quantity: mass
      material_value: ignored
      output_unit: kg
      requires: [bom_quantity, material_uom]
      formula: unit_convert(bom_quantity, material_uom, "kg")
    units:
      mg:
        factor: 0.000001
        aliases: [milligram, milligrams]
      g:
        factor: 0.001
        aliases: [gram, grams]
      kg:
        factor: 1
        aliases: [kilogram, kilograms]
      oz:
        factor: 0.028349523125
        aliases: [ounce, ounces]
      lb:
        factor: 0.45359237
        aliases: [lbs, pound, pounds]
      short_ton:
        factor: 907.18474
        aliases: [short ton, short tons, us ton, us tons]
      t:
        factor: 1000
        aliases: [tonne, tonnes, metric ton, metric tons, metric tonne, metric tonnes]

  areal_density:
    base: kg_per_m2
    consumption:
      basis: areal_density
      bom_quantity: length
      material_value: mass_per_area
      output_unit: kg
      requires: [bom_quantity, material_uom, material_weight, cuttable_width]
      formula: bom_length * cuttable_width * material_weight_per_area
    units:
      kg_per_m2:
        factor: 1
        basis_units:
          bom_quantity_unit: m
          width_unit: m
        aliases: [kg/m2, kg/m², kg per m2, kg/sqm]
      g_per_m2:
        factor: 0.001
        basis_units:
          bom_quantity_unit: m
          width_unit: m
        aliases: [gsm, g/m2, g/m², g per m2, g/sqm]
      oz_per_yd2:
        factor: 0.0339057474748823
        basis_units:
          bom_quantity_unit: yd
          width_unit: yd
        aliases: [oz/yd2, oz/yd², oz per yd2, ounce per square yard, ounces per square yard]

  linear_density:
    base: kg_per_m
    consumption:
      basis: linear_density
      bom_quantity: length
      material_value: mass_per_length
      output_unit: kg
      requires: [bom_quantity, material_uom, material_weight]
      formula: bom_length * material_weight_per_length
    units:
      kg_per_m:
        factor: 1
        basis_units:
          bom_quantity_unit: m
        aliases: [kg/m, kg per m]
      g_per_m:
        factor: 0.001
        basis_units:
          bom_quantity_unit: m
        aliases: [g/m, g per m]
      tex:
        factor: 0.000001
        basis_units:
          bom_quantity_unit: m
        aliases: [tex]
      dtex:
        factor: 0.0000001
        basis_units:
          bom_quantity_unit: m
        aliases: [decitex]
      denier:
        factor: 0.000000111111111111
        basis_units:
          bom_quantity_unit: m
        aliases: [den]
      oz_per_yd:
        factor: 0.0310034154910324
        basis_units:
          bom_quantity_unit: yd
        aliases: [oz/yd, oz per yd, ounce per yard, ounces per yard]

  area:
    base: m2
    units:
      mm2:
        factor: 0.000001
        aliases: [sq mm, square millimeter, square millimeters]
      cm2:
        factor: 0.0001
        aliases: [sq cm, square centimeter, square centimeters]
      m2:
        factor: 1
        aliases: [sqm, sq m, sq. m, square meter, square meters, "m²"]
      in2:
        factor: 0.00064516
        aliases: [sq in, sq. in, square inch, square inches, "in^2"]
      ft2:
        factor: 0.09290304
        aliases: [sq ft, sq. ft, sqft, sf, square foot, square feet, "ft^2"]
      yd2:
        factor: 0.83612736
        aliases: [sq yd, sq. yd, sqyd, sy, square yard, square yards, "yd^2"]

  length:
    base: m
    units:
      mm:
        factor: 0.001
        aliases: [millimeter, millimeters]
      cm:
        factor: 0.01
        aliases: [centimeter, centimeters]
      m:
        factor: 1
        aliases: [meter, meters]
      in:
        factor: 0.0254
        aliases: [inch, inches]
      ft:
        factor: 0.3048
        aliases: [foot, feet]
      yd:
        factor: 0.9144
        aliases: [yard, yards]

  count:
    base: pcs
    consumption:
      basis: per_piece_mass
      bom_quantity: count
      material_value: grams_per_piece
      material_value_unit: g
      output_unit: kg
      requires: [bom_quantity, material_uom, material_weight]
      formula: bom_quantity * material_weight_g / 1000
    units:
      pcs:
        factor: 1
        aliases: [pc, piece, pieces, ea, each]
      dozen:
        factor: 12
        aliases: [doz, dozens]

  volume:
    base: l
    units:
      ml:
        factor: 0.001
        aliases: [milliliter, milliliters]
      l:
        factor: 1
        aliases: [liter, liters, litre, litres]
      m3:
        factor: 1000
        aliases: [cbm, cubic meter, cubic meters, "m^3"]
      in3:
        factor: 0.016387064
        aliases: [cu in, cubic inch, cubic inches, "in^3"]
      ft3:
        factor: 28.316846592
        aliases: [cu ft, cubic foot, cubic feet, "ft^3"]
      gal_us:
        factor: 3.785411784
        aliases: [gal, gallon, gallons, us gallon, us gallons]
      fl_oz_us:
        factor: 0.0295735295625
        aliases: [fl oz, fluid ounce, fluid ounces, us fluid ounce, us fluid ounces]
