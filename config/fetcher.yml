timeout: 30
retry_max_attempts: 3
retry_base_seconds: 15
retry_max_seconds: 30
output_dir: raw
checkpoint_dir: checkpoints

endpoints:
  - name: seasons
    api_version: v2
    path: seasons
    count_spec:
      path: count/Season
  - name: styles
    api_version: v2
    path: styles
    count_spec:
      path: count/Style
  - name: materials
    api_version: v2
    path: materials
    count_spec:
      path: count/Material
  - name: colorways
    api_version: v2
    path: colorways
    count_spec:
      path: count/Colorway
  - name: collections
    api_version: v2
    path: collections
    count_spec:
      path: count/Collection
  - name: category1s
    api_version: v2
    path: category1s
    count_spec:
      path: count/Category1
  - name: category2s
    api_version: v2
    path: category2s
    count_spec:
      path: count/Category2
  - name: sizes
    api_version: v2
    path: product_sizes
    count_spec:
      path: count/ProductSize
  - name: boms
    api_version: v3
    path: apparel_bom_revisions
    count_spec:
      path: count/ApparelBOMRevision
  - name: bom_section_definitions
    api_version: v2
    path: bom_section_definitions
    count_spec:
      path: count/BOMSectionDefinition
  - name: bomrows
    api_version: v3
    path: part_materials
    count_spec:
      path: count/PartMaterial
  - name: supplierquotes
    api_version: v2
    path: supplier_item_revisions
    count_spec:
      path: count/SupplierItemRevision
  - name: suppliers
    api_version: v2
    path: suppliers
    count_spec:
      path: count/Supplier
  - name: factories
    api_version: v2
    path: factories
    count_spec:
      path: count/Factory
