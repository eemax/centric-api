<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Validation History</title>
<style>
:root {
  color-scheme: light;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: #17202a;
  background: #f4f6f8;
  --bg: #f4f6f8;
  --surface: #ffffff;
  --surface-soft: #f9fafb;
  --line: #dbe2ea;
  --line-strong: #c4ced9;
  --text: #17202a;
  --muted: #667384;
  --muted-strong: #425162;
  --ink-soft: #edf1f5;
  --accent: #2f6f73;
  --accent-soft: #e4f1ef;
  --good: #1d7a46;
  --good-bg: #e8f4ed;
  --bad: #b42318;
  --bad-bg: #fae8e6;
  --neutral: #5b6673;
  --neutral-bg: #eef1f4;
  --warn: #966800;
  --warn-bg: #fff4d6;
  --shadow: 0 8px 20px rgba(28, 39, 52, 0.07);
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); }
button, select { font: inherit; }
button { cursor: pointer; }
main { max-width: 1480px; margin: 0 auto; padding: 20px; }
.hero {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: end;
  margin-bottom: 12px;
}
.eyebrow {
  margin: 0 0 5px;
  color: var(--accent);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
}
h1 { margin: 0; font-size: 30px; line-height: 1.08; letter-spacing: 0; }
.meta { margin-top: 6px; color: var(--muted); font-size: 13px; }
.run-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
}
.pill {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  padding: 5px 9px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--surface);
  color: var(--muted-strong);
  font-size: 12px;
  font-weight: 750;
  white-space: nowrap;
}
.pill.good { color: var(--good); background: var(--good-bg); border-color: #bfdec9; }
.pill.bad { color: var(--bad); background: var(--bad-bg); border-color: #efc0bb; }
.pill.neutral { color: var(--neutral); background: var(--neutral-bg); }
.summary-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 12px;
}
.summary-card {
  min-height: 96px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  box-shadow: var(--shadow);
}
.summary-label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 750;
}
.summary-label span { display: block; }
.summary-label span + span {
  margin-top: 4px;
  color: var(--muted-strong);
  font-size: 11px;
}
.summary-value {
  margin-top: 9px;
  font-size: 28px;
  line-height: 1;
  font-weight: 850;
  letter-spacing: 0;
}
.summary-sub {
  margin-top: 7px;
  color: var(--muted);
  font-size: 12px;
}
.progress {
  height: 7px;
  margin-top: 9px;
  overflow: hidden;
  border-radius: 999px;
  background: var(--ink-soft);
}
.progress i {
  display: block;
  height: 100%;
  width: 0;
  border-radius: inherit;
  background: var(--accent);
}
.layout {
  display: grid;
  grid-template-columns: 296px minmax(0, 1fr);
  gap: 12px;
  align-items: start;
}
.panel {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
  box-shadow: var(--shadow);
}
.filter-panel {
  position: sticky;
  top: 10px;
  padding: 12px;
}
.section-title {
  margin: 0 0 8px;
  color: var(--muted-strong);
  font-size: 12px;
  font-weight: 850;
  letter-spacing: .06em;
  text-transform: uppercase;
}
.control-stack { display: grid; gap: 10px; }
label, .field-label {
  display: grid;
  gap: 6px;
  color: var(--muted-strong);
  font-size: 12px;
  font-weight: 800;
}
select {
  width: 100%;
  min-height: 36px;
  padding: 7px 9px;
  border: 1px solid var(--line-strong);
  border-radius: 7px;
  background: var(--surface);
  color: var(--text);
}
select:focus, button:focus-visible {
  outline: 2px solid rgba(47, 111, 115, .25);
  outline-offset: 2px;
}
select[multiple] {
  min-height: 118px;
  padding: 6px;
}
.filter-card {
  display: grid;
  gap: 7px;
  padding: 9px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-soft);
}
.filter-card[hidden],
#seasonTypePanel[hidden] {
  display: none;
}
.filter-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.filter-actions {
  display: inline-flex;
  gap: 6px;
}
.filter-actions button, .ghost-button, .tab-button {
  min-height: 30px;
  padding: 6px 9px;
  border: 1px solid var(--line-strong);
  border-radius: 7px;
  background: var(--surface);
  color: var(--muted-strong);
  font-size: 12px;
  font-weight: 800;
}
.filter-actions button:hover, .ghost-button:hover, .tab-button:hover {
  border-color: #9eb2bf;
  background: #f7fafb;
}
.filter-count {
  color: var(--muted);
  font-size: 11px;
  font-weight: 750;
}
.scope-tabs {
  display: grid;
  grid-template-columns: 1fr;
  gap: 7px;
}
.tab-button {
  width: 100%;
  text-align: left;
}
.tab-button.active {
  border-color: #9fc5c6;
  background: var(--accent-soft);
  color: #21595d;
}
#scope { display: none; }
.content-stack { display: grid; gap: 12px; }
.chart-panel { padding: 14px; }
.chart-head {
  display: flex;
  justify-content: space-between;
  gap: 14px;
  align-items: start;
  margin-bottom: 8px;
}
.chart-title { margin: 0; font-size: 18px; line-height: 1.25; letter-spacing: 0; }
.chart-subtitle { margin-top: 5px; color: var(--muted); font-size: 12px; }
#chart {
  width: 100%;
  height: 460px;
  display: block;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: linear-gradient(#ffffff, #fbfcfd);
}
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 12px;
  margin-top: 10px;
  max-height: 82px;
  overflow: auto;
  color: var(--muted-strong);
  font-size: 12px;
}
.legend span { display: inline-flex; align-items: center; gap: 6px; min-height: 22px; }
.swatch { width: 18px; height: 3px; border-radius: 999px; display: inline-block; }
.trend-note { color: var(--muted); font-size: 12px; margin-top: 8px; }
.table-panel { overflow: hidden; }
.table-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
  padding: 12px 14px 0;
}
.table-wrap { overflow: auto; max-height: 520px; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
th, td {
  border-bottom: 1px solid var(--line);
  padding: 8px 10px;
  text-align: left;
  vertical-align: middle;
}
th {
  position: sticky;
  top: 0;
  z-index: 1;
  background: #f1f5f7;
  color: var(--muted-strong);
  font-size: 11px;
  font-weight: 850;
  letter-spacing: .04em;
  text-transform: uppercase;
}
tbody tr:hover { background: #fbfcfd; }
.series-cell { min-width: 280px; font-weight: 750; }
.value-cell { min-width: 150px; }
.value-main { font-weight: 850; }
.mini-progress {
  width: 118px;
  height: 6px;
  margin-top: 6px;
  overflow: hidden;
  border-radius: 999px;
  background: var(--ink-soft);
}
.mini-progress i { display: block; height: 100%; background: var(--accent); }
.movement {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 850;
}
.movement.good { color: var(--good); background: var(--good-bg); }
.movement.bad { color: var(--bad); background: var(--bad-bg); }
.movement.flat, .movement.neutral, .movement.new { color: var(--neutral); background: var(--neutral-bg); }
.empty {
  color: var(--muted);
  font-size: 13px;
}
.empty-state {
  padding: 36px;
  color: var(--muted);
  text-align: center;
}
a.report-link {
  color: var(--accent);
  font-weight: 800;
  text-decoration: none;
}
a.report-link:hover { text-decoration: underline; }
@media (max-width: 1120px) {
  main { padding: 16px; }
  .hero, .layout { grid-template-columns: 1fr; }
  .run-strip { justify-content: flex-start; }
  .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .filter-panel { position: static; }
}
@media (max-width: 680px) {
  main { padding: 12px; }
  h1 { font-size: 26px; }
  .summary-grid { grid-template-columns: 1fr; }
  .chart-head, .table-head { align-items: stretch; flex-direction: column; }
  #chart { height: 400px; }
}
</style>
</head>
<body>
<main>
  <header class="hero">
    <div>
      <p class="eyebrow">Validation</p>
      <h1>Readiness History</h1>
      <div class="meta">Generated __GENERATED_AT__ · group __GROUP__ · __POINT_COUNT__ grouped points from __RUN_COUNT__ runs</div>
    </div>
    <div class="run-strip" id="runStrip"></div>
  </header>

  <section class="summary-grid" id="summaryGrid" aria-label="Latest validation summary"></section>

  <div class="layout">
    <aside class="panel filter-panel">
      <p class="section-title">Controls</p>
      <div class="control-stack">
        <label>Validator<select id="validator"></select></label>
        <label>Metric<select id="metric"></select></label>
        <label id="seasonTypePanel">Season Type<select id="seasonType"></select></label>
        <select id="scope" aria-label="Scope"></select>
        <div>
          <div class="field-label" style="margin-bottom: 6px;">View</div>
          <div class="scope-tabs" id="scopeTabs"></div>
        </div>
        <div class="filter-card" id="seasonPanel">
          <div class="filter-head">
            <div>
              <div class="field-label">Seasons</div>
              <div class="filter-count" id="seasonCount"></div>
            </div>
            <div class="filter-actions">
              <button id="allSeasons" type="button">All</button>
              <button id="noSeasons" type="button">Clear</button>
            </div>
          </div>
          <select id="seasonSelect" multiple size="7"></select>
        </div>
        <div class="filter-card" id="conceptPanel">
          <div class="filter-head">
            <div>
              <div class="field-label">Concepts</div>
              <div class="filter-count" id="conceptCount"></div>
            </div>
            <div class="filter-actions">
              <button id="allConcepts" type="button">All</button>
              <button id="noConcepts" type="button">Clear</button>
            </div>
          </div>
          <select id="conceptSelect" multiple size="7"></select>
        </div>
        <div class="filter-card" id="brandPanel">
          <div class="filter-head">
            <div>
              <div class="field-label">Brands</div>
              <div class="filter-count" id="brandCount"></div>
            </div>
            <div class="filter-actions">
              <button id="allBrands" type="button">All</button>
              <button id="noBrands" type="button">Clear</button>
            </div>
          </div>
          <select id="brandSelect" multiple size="7"></select>
        </div>
      </div>
    </aside>

    <div class="content-stack">
      <section class="panel chart-panel">
        <div class="chart-head">
          <div>
            <h2 class="chart-title" id="chartTitle">History</h2>
            <div class="chart-subtitle" id="chartSubtitle"></div>
          </div>
          <span class="pill neutral" id="seriesCount"></span>
        </div>
        <svg id="chart" role="img" aria-label="Validation metric history chart"></svg>
        <div id="legend" class="legend"></div>
        <div id="trendNote" class="trend-note"></div>
      </section>

      <section class="panel table-panel">
        <div class="table-head">
          <div>
            <p class="section-title" style="margin-bottom: 2px;">Latest Points</p>
            <div class="chart-subtitle" id="tableSubtitle"></div>
          </div>
          <button class="ghost-button" id="resetFilters" type="button">Reset Filters</button>
        </div>
        <div class="table-wrap">
          <table id="latest">
            <thead>
              <tr>
                <th>Series</th>
                <th>Bucket</th>
                <th>Value</th>
                <th>Previous</th>
                <th>Change</th>
                <th>Movement</th>
                <th>Started</th>
                <th>Report</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>
</main>
<script>
const historyPayload = __HISTORY_JSON__;
const points = historyPayload.points || [];
const colors = [
  "#2f6f73", "#b4562a", "#5567a6", "#7a5c99", "#21865d", "#b83b5e",
  "#8a6d1d", "#3f7fba", "#99613f", "#54705f", "#c45f35", "#65727f"
];
const summaryMetrics = [
  "Style Completion %",
  "Material Completion %",
  "Active Styles",
  "Failed Styles",
  "Styles With Blocking Issues",
];
const preferredMetricOrder = [
  "Style Completion %",
  "Material Completion %",
  "Active Styles",
  "Ready Styles",
  "Failed Styles",
  "Styles With Blocking Issues",
  "Styles With Hard Warnings",
  "Reference Warnings",
];
const preferredScopeOrder = ["overall", "year", "concept", "concept_brand_season"];
const validatorSelect = document.getElementById("validator");
const metricSelect = document.getElementById("metric");
const scopeSelect = document.getElementById("scope");
const scopeTabs = document.getElementById("scopeTabs");
const seasonPanel = document.getElementById("seasonPanel");
const conceptPanel = document.getElementById("conceptPanel");
const brandPanel = document.getElementById("brandPanel");
const conceptSelect = document.getElementById("conceptSelect");
const allConceptsButton = document.getElementById("allConcepts");
const noConceptsButton = document.getElementById("noConcepts");
const conceptCount = document.getElementById("conceptCount");
const brandSelect = document.getElementById("brandSelect");
const allBrandsButton = document.getElementById("allBrands");
const noBrandsButton = document.getElementById("noBrands");
const brandCount = document.getElementById("brandCount");
const seasonTypePanel = document.getElementById("seasonTypePanel");
const seasonTypeSelect = document.getElementById("seasonType");
const seasonSelect = document.getElementById("seasonSelect");
const allSeasonsButton = document.getElementById("allSeasons");
const noSeasonsButton = document.getElementById("noSeasons");
const seasonCount = document.getElementById("seasonCount");
const resetFiltersButton = document.getElementById("resetFilters");
const chart = document.getElementById("chart");
const legend = document.getElementById("legend");
const trendNote = document.getElementById("trendNote");
const latestBody = document.querySelector("#latest tbody");
const summaryGrid = document.getElementById("summaryGrid");
const runStrip = document.getElementById("runStrip");
const chartTitle = document.getElementById("chartTitle");
const chartSubtitle = document.getElementById("chartSubtitle");
const tableSubtitle = document.getElementById("tableSubtitle");
const seriesCount = document.getElementById("seriesCount");

function unique(values) { return [...new Set(values.filter(Boolean))].sort((a, b) => String(a).localeCompare(String(b))); }
function metricSort(a, b) {
  const ai = preferredMetricOrder.indexOf(a);
  const bi = preferredMetricOrder.indexOf(b);
  if (ai !== -1 || bi !== -1) return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
  return a.localeCompare(b);
}
function scopeSort(a, b) {
  const ai = preferredScopeOrder.indexOf(a);
  const bi = preferredScopeOrder.indexOf(b);
  if (ai !== -1 || bi !== -1) return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
  return a.localeCompare(b);
}
function fill(select, values, preferred = "") {
  const current = select.value;
  select.innerHTML = "";
  for (const value of values) {
    const option = document.createElement("option");
    option.value = value;
    option.textContent = value;
    select.appendChild(option);
  }
  if (current && values.includes(current)) select.value = current;
  else if (preferred && values.includes(preferred)) select.value = preferred;
  else if (values.length) select.value = values[0];
}
function fillMulti(select, values, selectedByDefault = true) {
  const previous = new Set([...select.selectedOptions].map(option => option.value));
  select.innerHTML = "";
  for (const value of values) {
    const option = document.createElement("option");
    option.value = value;
    option.textContent = value;
    option.selected = previous.size === 0 ? selectedByDefault : previous.has(value);
    select.appendChild(option);
  }
  if (values.length && ![...select.options].some(option => option.selected) && selectedByDefault) {
    [...select.options].forEach(option => { option.selected = true; });
  }
}
function init() {
  const validators = unique(points.map(p => p.validator));
  fill(validatorSelect, validators);
  refreshMetrics();
  draw();
}
function refreshMetrics() {
  const validator = validatorSelect.value;
  const subset = points.filter(p => p.validator === validator);
  fill(metricSelect, unique(subset.map(p => p.metric)).sort(metricSort), "Style Completion %");
  refreshScopes();
  renderSummary();
}
function refreshScopes() {
  const validator = validatorSelect.value;
  const metric = metricSelect.value;
  const subset = points.filter(p => p.validator === validator && p.metric === metric);
  fill(scopeSelect, unique(subset.map(p => p.scope)).sort(scopeSort), "concept_brand_season");
  renderScopeTabs();
  refreshSeasonTypes();
  refreshConcepts();
  refreshBrands();
}
function renderScopeTabs() {
  const scopes = [...scopeSelect.options].map(option => option.value);
  scopeTabs.innerHTML = "";
  for (const scope of scopes) {
    const button = document.createElement("button");
    button.type = "button";
    button.className = `tab-button${scope === scopeSelect.value ? " active" : ""}`;
    button.textContent = scopeLabel(scope);
    button.addEventListener("click", () => {
      scopeSelect.value = scope;
      refreshSeasonTypes();
      refreshConcepts();
      refreshBrands();
      renderScopeTabs();
      draw();
    });
    scopeTabs.appendChild(button);
  }
}
function refreshConcepts() {
  if (!usesConceptFilter()) {
    fillMulti(conceptSelect, []);
    updateFilterCounts();
    return;
  }
  const selectedType = seasonTypeSelect.value;
  const seasons = selectedSeasons();
  const subset = selectedBasePoints().filter(p =>
    !usesSeasonFilter() ||
    ((!selectedType || seasonType(p) === selectedType) &&
      (!selectedType || seasons.has(seasonLabel(p))))
  );
  fillMulti(conceptSelect, unique(subset.map(p => conceptLabel(p))));
  updateFilterCounts();
}
function refreshBrands() {
  if (!usesBrandFilter()) {
    fillMulti(brandSelect, []);
    updateFilterCounts();
    return;
  }
  const concepts = selectedConcepts();
  const selectedType = seasonTypeSelect.value;
  const seasons = selectedSeasons();
  const subset = selectedBasePoints().filter(p =>
    (!usesConceptFilter() || concepts.has(conceptLabel(p))) &&
    (!usesSeasonFilter() ||
      ((!selectedType || seasonType(p) === selectedType) &&
        (!selectedType || seasons.has(seasonLabel(p)))))
  );
  fillMulti(brandSelect, unique(subset.map(p => brandLabel(p))));
  updateFilterCounts();
}
function refreshSeasonTypes() {
  if (!usesSeasonFilter()) {
    fillSeasonTypes([""], "");
    refreshSeasons();
    return;
  }
  const subset = selectedBasePoints();
  const types = unique(subset.map(p => seasonType(p)).filter(Boolean)).sort(seasonTypeSort);
  fillSeasonTypes(types.length ? types : [""], "seasonal");
  refreshSeasons();
}
function fillSeasonTypes(values, preferred = "") {
  const current = seasonTypeSelect.value;
  seasonTypeSelect.innerHTML = "";
  for (const value of values) {
    const option = document.createElement("option");
    option.value = value;
    option.textContent = seasonTypeLabel(value);
    seasonTypeSelect.appendChild(option);
  }
  if (current && values.includes(current)) seasonTypeSelect.value = current;
  else if (preferred && values.includes(preferred)) seasonTypeSelect.value = preferred;
  else if (values.length) seasonTypeSelect.value = values[0];
}
function refreshSeasons() {
  if (!usesSeasonFilter()) {
    fillMulti(seasonSelect, []);
    seasonSelect.disabled = true;
    allSeasonsButton.disabled = true;
    noSeasonsButton.disabled = true;
    updateFilterCounts();
    return;
  }
  const selectedType = seasonTypeSelect.value;
  const seasons = selectedType
    ? unique(selectedBasePoints()
        .filter(p => seasonType(p) === selectedType)
        .map(p => seasonLabel(p))
        .filter(Boolean))
        .sort(seasonLabelRecencySort)
    : [];
  fillMulti(seasonSelect, seasons);
  const disabled = seasons.length === 0;
  seasonSelect.disabled = disabled;
  allSeasonsButton.disabled = disabled;
  noSeasonsButton.disabled = disabled;
  updateFilterCounts();
}
function selectedBasePoints() {
  return points.filter(p =>
    p.validator === validatorSelect.value &&
    p.metric === metricSelect.value &&
    p.scope === scopeSelect.value
  );
}
function selectedBrands() {
  return new Set([...brandSelect.selectedOptions].map(option => option.value));
}
function selectedConcepts() {
  return new Set([...conceptSelect.selectedOptions].map(option => option.value));
}
function selectedSeasons() {
  return new Set([...seasonSelect.selectedOptions].map(option => option.value));
}
function selectAll(select) {
  [...select.options].forEach(option => { option.selected = true; });
}
function selectNone(select) {
  [...select.options].forEach(option => { option.selected = false; });
}
function filteredPoints() {
  const filterConcepts = usesConceptFilter();
  const filterBrands = usesBrandFilter();
  const filterSeasons = usesSeasonFilter();
  const concepts = filterConcepts ? selectedConcepts() : new Set();
  const brands = filterBrands ? selectedBrands() : new Set();
  const selectedType = seasonTypeSelect.value;
  const seasons = filterSeasons ? selectedSeasons() : new Set();
  return points.filter(p =>
    p.validator === validatorSelect.value &&
    p.metric === metricSelect.value &&
    p.scope === scopeSelect.value &&
    (!filterConcepts || concepts.has(conceptLabel(p))) &&
    (!filterBrands || brands.has(brandLabel(p))) &&
    (!filterSeasons || !selectedType || seasonType(p) === selectedType) &&
    (!filterSeasons || !selectedType || seasons.has(seasonLabel(p)))
  );
}
function draw() {
  renderSummary();
  const selected = filteredPoints();
  const seriesMap = groupedSeries(selected);
  const latestMap = latestBySeries(seriesMap);
  renderRunStrip();
  renderChart(selected, seriesMap);
  renderLatestTable(latestMap, seriesMap);
  updateFilterVisibility();
  updateFilterCounts();
  chartTitle.textContent = metricSelect.value || "History";
  chartSubtitle.textContent = chartSubtitleParts().join(" · ");
  tableSubtitle.textContent = `${latestMap.size} latest series from ${selected.length} grouped points`;
  seriesCount.textContent = `${seriesMap.size} series`;
}
function chartSubtitleParts() {

function valueDomain(selected) {

  const min = Math.min(...values);
  const max = Math.max(...values);
  const unit = selected[0]?.unit || "number";
  if (unit === "percent") {
    const pad = min === max ? 5 : Math.max((max - min) * 0.12, 1);
    let yMin = Math.max(0, min - pad);
    let yMax = Math.min(100, max + pad);
    if (yMin === yMax) {
      yMin = Math.max(0, yMin - 5);
      yMax = Math.min(100, yMax + 5);
    }
    if (yMin === yMax) yMax = yMin + 1;
    return {min: yMin, max: yMax};

function groupedSeries(selected) {

  for (const series of grouped.values()) {

function seasonRecencySortKey(point) {

function parseSeasonLabel(label) {

  if (cyclePrefix) return {slot: cyclePrefix[1], year: fullYear(cyclePrefix[2])};

function seasonSortKey(label) {
